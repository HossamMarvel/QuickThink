
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .game-wrapper {
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    background: #0a0a1a;
    color: #fff;
    overflow: hidden;
    position: relative;
    padding: 20px;
  }

  .stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(1); }
    50% { opacity: var(--op); transform: scale(1.5); }
  }

  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }
  .nebula-1 { width: 400px; height: 400px; background: rgba(88, 28, 255, 0.15); top: -100px; left: -100px; animation: drift1 8s ease-in-out infinite; }
  .nebula-2 { width: 300px; height: 300px; background: rgba(0, 210, 190, 0.12); bottom: -50px; right: -50px; animation: drift2 10s ease-in-out infinite; }
  .nebula-3 { width: 250px; height: 250px; background: rgba(255, 100, 180, 0.1); top: 40%; left: 60%; animation: drift3 7s ease-in-out infinite; }

  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,30px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
  @keyframes drift3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-15px,20px)} }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
    animation: slideDown 0.8s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .title {
    font-size: 2.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #a78bfa, #06b6d4, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    letter-spacing: 2px;
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%,100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
  }

  .subtitle {
    font-size: 0.9rem;
    color: #94a3b8;
    margin-top: 5px;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 25px;
    animation: slideDown 0.9s ease;
  }

  .stat-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(167, 139, 250, 0.3);
    border-radius: 12px;
    padding: 10px 20px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: transform 0.2s, border-color 0.2s;
  }

  .stat-card:hover { transform: translateY(-2px); border-color: rgba(167,139,250,0.6); }

  .stat-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: #a78bfa;
  }

  .stat-label {
    font-size: 0.7rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .game-area {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 30px 20px;
    backdrop-filter: blur(20px);
    animation: fadeIn 1s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .question-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .level-badge {
    background: linear-gradient(135deg, #6d28d9, #4f46e5);
    color: white;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 0 15px rgba(109,40,217,0.5);
  }

  .progress-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #6d28d9, #06b6d4);
    border-radius: 3px;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgba(6,182,212,0.6);
  }

  .question-box {
    text-align: center;
    margin-bottom: 28px;
  }

  .question-type {
    font-size: 0.75rem;
    color: #06b6d4;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .question-text {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.4;
    color: #f1f5f9;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: questionIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes questionIn {
    from { opacity: 0; transform: scale(0.7) rotateX(-20deg); }
    to { opacity: 1; transform: scale(1) rotateX(0); }
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .option-btn {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 18px 14px;
    color: #e2e8f0;
    font-size: 1rem;
    font-weight: 600;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
    text-align: center;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(167,139,250,0.1));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .option-btn:hover:not(:disabled) {
    border-color: rgba(167,139,250,0.7);
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 25px rgba(109,40,217,0.3);
    color: #a78bfa;
  }

  .option-btn:hover:not(:disabled)::before { opacity: 1; }

  .option-btn:active:not(:disabled) { transform: scale(0.97); }

  .option-btn.correct {
    background: rgba(16,185,129,0.2);
    border-color: #10b981;
    color: #10b981;
    box-shadow: 0 0 25px rgba(16,185,129,0.4);
    animation: correctPulse 0.6s ease;
  }

  .option-btn.wrong {
    background: rgba(239,68,68,0.2);
    border-color: #ef4444;
    color: #ef4444;
    box-shadow: 0 0 20px rgba(239,68,68,0.3);
    animation: shake 0.5s ease;
  }

  @keyframes correctPulse {
    0%,100% { transform: scale(1); }
    30% { transform: scale(1.06); }
    60% { transform: scale(0.97); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .feedback-msg {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 700;
    min-height: 36px;
    margin-top: 18px;
    animation: feedbackIn 0.4s ease;
  }

  @keyframes feedbackIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback-correct { color: #10b981; text-shadow: 0 0 15px rgba(16,185,129,0.6); }
  .feedback-wrong { color: #f87171; }

  .timer-ring {
    width: 50px; height: 50px;
    position: relative;
    flex-shrink: 0;
  }

  .timer-ring svg { transform: rotate(-90deg); }

  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    color: #a78bfa;
  }

  .end-screen {
    display: none;
    text-align: center;
    padding: 20px 0;
  }

  .trophy {
    font-size: 4rem;
    animation: bounce 1s ease infinite;
    display: block;
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .end-title {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 15px 0 8px;
  }

  .end-score {
    font-size: 1.1rem;
    color: #94a3b8;
    margin-bottom: 25px;
  }

  .restart-btn {
    background: linear-gradient(135deg, #6d28d9, #4f46e5);
    border: none;
    border-radius: 14px;
    padding: 14px 40px;
    color: white;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(109,40,217,0.5);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .restart-btn:hover { transform: scale(1.06); box-shadow: 0 0 40px rgba(109,40,217,0.7); }

  .particles-container { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  .particle {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: particleFly 1s ease-out forwards;
  }

  @keyframes particleFly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  .streak-badge {
    display: inline-block;
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: white;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-right: 8px;
    box-shadow: 0 0 15px rgba(245,158,11,0.5);
    animation: glowPulse 1.5s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%,100% { box-shadow: 0 0 10px rgba(245,158,11,0.4); }
    50% { box-shadow: 0 0 25px rgba(245,158,11,0.8); }
  }
</style>

<div class="game-wrapper">
  <div class="stars" id="stars"></div>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  <div class="particles-container" id="particles"></div>

  <div class="container">
    <div class="header">
      <div class="title">🧠 تحدي العقول</div>
      <div class="subtitle">اختبر ذكاءك وسرعة تفكيرك</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="score-display">0</div>
        <div class="stat-label">النقاط</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="streak-display">0</div>
        <div class="stat-label">اللى انا شاطر فيه</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="q-display">1</div>
        <div class="stat-label">السؤال</div>
      </div>
    </div>

    <div class="game-area" id="game-area">
      <div class="question-header">
        <div class="level-badge" id="level-badge">مستوى 1</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progress-bar" style="width:10%"></div>
        </div>
        <div class="timer-ring">
          <svg width="50" height="50" viewBox="0 0 50 50">
            <circle cx="25" cy="25" r="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
            <circle cx="25" cy="25" r="20" fill="none" stroke="#a78bfa" stroke-width="3"
              stroke-dasharray="125.66" id="timer-circle" stroke-dashoffset="0" stroke-linecap="round"
              style="transition: stroke-dashoffset 1s linear, stroke 0.5s;"/>
          </svg>
          <div class="timer-num" id="timer-num">15</div>
        </div>
      </div>

      <div class="question-box">
        <div class="question-type" id="q-type">سؤال رياضي</div>
        <div class="question-text" id="q-text">جاري التحميل...</div>
      </div>

      <div class="options-grid" id="options-grid"></div>
      <div class="feedback-msg" id="feedback"></div>
    </div>

    <div class="end-screen" id="end-screen">
      <span class="trophy" id="trophy-icon">🏆</span>
      <div class="end-title" id="end-title">رائع!</div>
      <div class="end-score" id="end-score"></div>
      <button class="restart-btn" onclick="restartGame()">العب مرة أخرى 🚀</button>
    </div>
  </div>
</div>

<script>
const questions = [
  { type: "رياضيات 🔢", q: "كم يساوي 7 × 8 ؟", options: ["54", "56", "48", "63"], answer: "56" },
  { type: "منطق 🎯", q: "الرقم التالي في المتتالية: 2، 4، 8، 16، ___", options: ["24", "28", "30", "32"], answer: "32" },
  { type: "ذكاء 🧩", q: "إذا كان كل الكلاب حيوانات، فهل كل الحيوانات كلاب؟", options: ["نعم دائماً", "لا بالضرورة", "أحياناً", "لا أعرف"], answer: "لا بالضرورة" },
  { type: "ألغاز 🌀", q: "ما له وجه ولكن لا يستطيع الرؤية؟", options: ["القمر", "الساعة", "الكتاب", "العملة المعدنية"], answer: "الساعة" },
  { type: "رياضيات 🔢", q: "كم عدد أوجه المثلث × عدد أوجه المربع؟", options: ["8", "12", "6", "9"], answer: "12" },
  { type: "منطق 🎯", q: "في 3 دقائق كم ثانية؟", options: ["150", "180", "300", "120"], answer: "180" },
  { type: "ذكاء 🧩", q: "ما الشيء الذي كلما أضفت منه كلما قلّ؟", options: ["الماء", "الحفرة", "الرمل", "الملح"], answer: "الحفرة" },
  { type: "رياضيات 🔢", q: "جذر 144 = ؟", options: ["11", "12", "13", "14"], answer: "12" },
  { type: "منطق 🎯", q: "الرقم الأوسط: 3، 7، 12، 19، 28", options: ["7", "12", "19", "28"], answer: "12" },
  { type: "ألغاز 🌀", q: "ما الشيء الذي يعبر النهر دون أن يتحرك؟", options: ["الجسر", "القارب", "السمك", "الريح"], answer: "الجسر" },
  { type: "رياضيات 🔢", q: "كم يساوي 9 + 6 + 5 ؟", options: ["18", "20", "21", "22"], answer: "20" },
  { type: "منطق 🎯", q: "إذا كان اليوم الثلاثاء، فما اليوم بعد غد؟", options: ["الأحد", "الأربعاء", "الخميس", "الجمعة"], answer: "الخميس" },
  { type: "ذكاء 🧩", q: "ما الشيء الذي له أسنان ولا يعض؟", options: ["المشط", "المفتاح", "الباب", "الحذاء"], answer: "المشط" },
  { type: "ألغاز 🌀", q: "ما الشيء الذي يكتب ولا يقرأ؟", options: ["القلم", "الطالب", "الورق", "الكتاب"], answer: "القلم" },
  { type: "رياضيات 🔢", q: "ناتج 5 × 5 - 10 ؟", options: ["10", "15", "20", "25"], answer: "15" },
  { type: "منطق 🎯", q: "أيهما أكبر؟", options: ["نصف 16", "8", "متساويان", "16"], answer: "متساويان" },
  { type: "ذكاء 🧩", q: "إذا كانت السيارة تسير بسرعة 60 كم/ساعة، فكم تقطع في ساعتين؟", options: ["30 كم", "60 كم", "90 كم", "120 كم"], answer: "120 كم" },
  { type: "ألغاز 🌀", q: "ما الشيء الذي كلما أخذت منه كبر؟", options: ["الحفرة", "الشجرة", "النور", "الكتاب"], answer: "الحفرة" },
  { type: "رياضيات 🔢", q: "كم يساوي 100 ÷ 4 ؟", options: ["20", "25", "40", "50"], answer: "25" },
  { type: "منطق 🎯", q: "كل التفاح فاكهة، وبعض الفواكه حمراء، فهل كل التفاح أحمر؟", options: ["نعم", "لا", "لا يمكن التأكد", "دائماً"], answer: "لا يمكن التأكد" },
  { type: "ذكاء 🧩", q: "لو كان لديك 3 تفاحات وأعطيت 1 لصديقك، كم يتبقى معك؟", options: ["1", "2", "3", "4"], answer: "2" },
  { type: "ألغاز 🌀", q: "ما الشيء الذي يوجد في القرن مرة وفي الدقيقة مرتين ولا يوجد في الساعة؟", options: ["حرف القاف", "حرف النون", "حرف الراء", "حرف الدال"], answer: "حرف القاف" },
  { type: "رياضيات 🔢", q: "إذا كان 3x + 5 = 20، فما قيمة x؟", options: ["3", "4", "5", "6"], answer: "5" },
  { type: "منطق 🎯", q: "في متتالية 1، 4، 9، 16، 25، ما العدد التالي؟", options: ["30", "35", "36", "49"], answer: "36" },
  { type: "ذكاء 🧩", q: "أب عمره 40 سنة وابنه عمره 10 سنوات، بعد كم سنة يصبح عمر الأب ضعف عمر الابن؟", options: ["10", "15", "20", "25"], answer: "20" },
  { type: "ألغاز 🌀", q: "ما الشيء الذي إذا نطقت اسمه اختفى؟", options: ["الصمت", "الضوء", "الهواء", "الظل"], answer: "الصمت" },
  { type: "رياضيات 🔢", q: "كم يساوي 15% من 240؟", options: ["24", "30", "36", "40"], answer: "36" },
  { type: "منطق 🎯", q: "إذا كانت كل الورود زهورًا، وبعض الزهور تذبل سريعًا، فأي نتيجة مؤكدة؟", options: ["كل الورود تذبل سريعًا", "بعض الورود قد تذبل سريعًا", "لا توجد ورود", "كل الزهور ورود"], answer: "بعض الورود قد تذبل سريعًا" },
  { type: "ذكاء 🧩", q: "ما العدد الذي إذا ضربته في نفسه ثم أضفت إليه نفسه كان الناتج 12؟", options: ["2", "3", "4", "6"], answer: "3" },
  { type: "ألغاز 🌀", q: "له مفاتيح كثيرة لكنه لا يفتح بابًا واحدًا، ما هو؟", options: ["الخزانة", "البيانو", "الحاسوب", "القفل"], answer: "البيانو" },
  { type: "رياضيات 🔢", q: "إذا كان محيط مربع 32 سم، فكم مساحة المربع؟", options: ["16", "32", "64", "128"], answer: "64" },
  { type: "منطق 🎯", q: "سارة أطول من ليلى، وليلى أطول من مها. من الأقصر؟", options: ["سارة", "ليلى", "مها", "لا يمكن تحديده"], answer: "مها" },
  { type: "ذكاء 🧩", q: "إذا احتاج 5 عمال إلى 5 أيام لإنهاء 5 صناديق، فكم يومًا يحتاج 10 عمال لإنهاء 10 صناديق بنفس المعدل؟", options: ["2", "5", "10", "20"], answer: "5" },
  { type: "ألغاز 🌀", q: "ما الشيء الذي كلما زاد نقص؟", options: ["العمر", "المطر", "النور", "المال"], answer: "العمر" },
  { type: "رياضيات 🔢", q: "كم يساوي (8 + 4) × 2 ÷ 3 ؟", options: ["6", "8", "10", "12"], answer: "8" },
  { type: "منطق 🎯", q: "في سباق تجاوزت العداء الموجود في المركز الثاني، فما مركزك الآن؟", options: ["الأول", "الثاني", "الثالث", "الأخير"], answer: "الثاني" },
  { type: "ذكاء 🧩", q: "معك 12 كرة، واحدة منها أثقل قليلًا من الباقي. ما أقل عدد مرات استخدام الميزان الكفتين لمعرفة الكرة الأثقل؟", options: ["2", "3", "4", "5"], answer: "3" },
  { type: "ألغاز 🌀", q: "ما الذي يمشي بلا أرجل ويبكي بلا عيون؟", options: ["السحاب", "الريح", "النهر", "الظل"], answer: "السحاب" },
  { type: "رياضيات 🔢", q: "إذا كان نصف عدد ما يساوي 18، فكم يساوي ثلثا هذا العدد؟", options: ["12", "18", "24", "30"], answer: "24" },
  { type: "منطق 🎯", q: "إذا كان أمس قبل يوم الخميس، فما اليوم الآن؟", options: ["الثلاثاء", "الأربعاء", "الخميس", "الجمعة"], answer: "الأربعاء" },
  { type: "ذكاء 🧩", q: "ما العدد المكوَّن من رقمين إذا عكست رقميه زاد بمقدار 27، ومجموع رقميه 11؟", options: ["29", "38", "47", "56"], answer: "29" },
  { type: "ألغاز 🌀", q: "مدينة بلا بيوت، ونهر بلا ماء، وغابة بلا أشجار. ما هي؟", options: ["الخريطة", "الصحراء", "الحلم", "المرآة"], answer: "الخريطة" },
];

let current = 0, score = 0, streak = 0, timer, timeLeft;
let gameQuestions = [];
const TOTAL = questions.length;
const TIME_PER_Q = 15;
let audioCtx;

function shuffleQuestions() {
  gameQuestions = [...questions].sort(() => Math.random() - 0.5);
}

function getAudioContext() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return null;
  if (!audioCtx) audioCtx = new AudioContextClass();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playToneSequence(notes, volume) {
  const ctx = getAudioContext();
  if (!ctx) return;
  const now = ctx.currentTime;

  notes.forEach((note, index) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const startAt = now + index * note.gap;
    const stopAt = startAt + note.duration;

    osc.type = note.wave || 'sine';
    osc.frequency.setValueAtTime(note.freq, startAt);
    gain.gain.setValueAtTime(0.0001, startAt);
    gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, stopAt);

    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(startAt);
    osc.stop(stopAt);
  });
}

function playCorrectSound() {
  playToneSequence([
    { freq: 523.25, duration: 0.14, gap: 0.16, wave: 'triangle' },
    { freq: 659.25, duration: 0.16, gap: 0.16, wave: 'triangle' },
    { freq: 783.99, duration: 0.2, gap: 0.16, wave: 'triangle' }
  ], 0.08);
}

function playWrongSound() {
  playToneSequence([
    { freq: 280, duration: 0.18, gap: 0.2, wave: 'sawtooth' },
    { freq: 180, duration: 0.24, gap: 0.2, wave: 'sawtooth' }
  ], 0.06);
}

function createStars() {
  const c = document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;--op:${0.3+Math.random()*0.7};
      animation-delay:${Math.random()*4}s;
      width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;`;
    c.appendChild(s);
  }
}

function loadQuestion() {
  if (current >= TOTAL) { showEndScreen(); return; }
  clearInterval(timer);
  const q = gameQuestions[current];
  document.getElementById('q-type').textContent = q.type;
  const qt = document.getElementById('q-text');
  qt.style.animation = 'none';
  void qt.offsetWidth;
  qt.style.animation = 'questionIn 0.5s cubic-bezier(0.34,1.56,0.64,1)';
  qt.textContent = q.q;
  document.getElementById('q-display').textContent = current+1;
  document.getElementById('level-badge').textContent = `مستوى ${Math.ceil((current+1)/3)}`;
  const pct = ((current)/TOTAL)*100+10;
  document.getElementById('progress-bar').style.width = Math.min(pct,100)+'%';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback-msg';

  const shuffled = [...q.options].sort(()=>Math.random()-0.5);
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  shuffled.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(opt, q.answer);
    grid.appendChild(btn);
  });

  startTimer();
}

function startTimer() {
  timeLeft = TIME_PER_Q;
  const circle = document.getElementById('timer-circle');
  const numEl = document.getElementById('timer-num');
  const circumference = 125.66;
  circle.style.stroke = '#a78bfa';

  timer = setInterval(() => {
    timeLeft--;
    numEl.textContent = timeLeft;
    const offset = circumference * (1 - timeLeft/TIME_PER_Q);
    circle.style.strokeDashoffset = offset;
    if(timeLeft <= 5) circle.style.stroke = '#ef4444';
    if(timeLeft <= 0) {
      clearInterval(timer);
      streak = 0;
      updateStreak();
      showFeedback(false, '⏱️ انتهى الوقت!');
      playWrongSound();
      disableOptions();
      setTimeout(() => { current++; loadQuestion(); }, 1400);
    }
  }, 1000);
}

function selectAnswer(chosen, correct) {
  clearInterval(timer);
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.disabled = true;
    if(b.textContent === correct) b.classList.add('correct');
    else if(b.textContent === chosen && chosen !== correct) b.classList.add('wrong');
  });

  if(chosen === correct) {
    streak++;
    const bonus = streak >= 3 ? 15 : streak >= 2 ? 10 : 0;
    const timeBonus = Math.floor(timeLeft * 0.5);
    score += 10 + bonus + timeBonus;
    document.getElementById('score-display').textContent = score;
    updateStreak();
    const msg = streak >= 3 ? `🔥 ${streak} على التوالي! +${10+bonus+timeBonus}` : `✅ صحيح! +${10+bonus+timeBonus}`;
    showFeedback(true, msg);
    playCorrectSound();
    spawnParticles(true);
  } else {
    streak = 0;
    updateStreak();
    showFeedback(false, `❌ الإجابة الصحيحة: ${correct}`);
    playWrongSound();
    spawnParticles(false);
  }

  setTimeout(() => { current++; loadQuestion(); }, 1600);
}

function disableOptions() {
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
}

function showFeedback(correct, msg) {
  const f = document.getElementById('feedback');
  f.textContent = msg;
  f.className = 'feedback-msg ' + (correct ? 'feedback-correct' : 'feedback-wrong');
}

function updateStreak() {
  document.getElementById('streak-display').textContent = streak;
}

function spawnParticles(success) {
  const container = document.getElementById('particles');
  const colors = success
    ? ['#10b981','#34d399','#6ee7b7','#a78bfa','#fbbf24']
    : ['#ef4444','#f87171'];
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i/18)*360;
    const dist = 80+Math.random()*120;
    const dx = Math.cos(angle*Math.PI/180)*dist;
    const dy = Math.sin(angle*Math.PI/180)*dist - 60;
    const color = colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText = `
      left:50%;top:60%;
      background:${color};
      --dx:${dx}px;--dy:${dy}px;
      animation-delay:${Math.random()*0.2}s;
      width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;
      box-shadow: 0 0 6px ${color};
    `;
    container.appendChild(p);
    setTimeout(()=>p.remove(), 1200);
  }
}

function showEndScreen() {
  clearInterval(timer);
  document.getElementById('game-area').style.display='none';
  const end = document.getElementById('end-screen');
  end.style.display='block';
  const pct = Math.round((score/(TOTAL*20))*100);
  let trophy='🏆', title='رائع!';
  if(score < TOTAL*5) { trophy='🌱'; title='استمر في التدريب!'; }
  else if(score < TOTAL*10) { trophy='⭐'; title='جيد جداً!'; }
  else if(score < TOTAL*15) { trophy='🥈'; title='ممتاز!'; }
  else { trophy='🏆'; title='عبقري!'; }
  document.getElementById('trophy-icon').textContent = trophy;
  document.getElementById('end-title').textContent = title;
  document.getElementById('end-score').innerHTML = `حصلت على <strong style="color:#a78bfa;font-size:1.4rem">${score}</strong> نقطة من أصل ${TOTAL*20}`;
  for(let i=0;i<5;i++) setTimeout(()=>spawnParticles(true), i*300);
}

function restartGame() {
  current=0;score=0;streak=0;
  shuffleQuestions();
  document.getElementById('score-display').textContent='0';
  document.getElementById('streak-display').textContent='0';
  document.getElementById('game-area').style.display='block';
  document.getElementById('end-screen').style.display='none';
  loadQuestion();
}

createStars();
shuffleQuestions();
loadQuestion();
</script>
